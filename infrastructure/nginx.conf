# =============================================================================
# Nginx Configuration - Centrifungal Backend (Railway)
# =============================================================================
#
# Serves the Laravel 13 + Statamic 6 backend API and control panel.
# Frontend is on Netlify - this only handles API routes and the Statamic CP.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    root /app/public;
    index index.php index.html;

    charset utf-8;

    # Max upload size - product images, content assets, etc.
    client_max_body_size 64M;

    # -------------------------------------------------------------------------
    # Security Headers (TASK-008)
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # CORS Headers (TASK-008)
    # Allow the Netlify frontend to access the Railway API directly if needed.
    # In practice the Netlify proxy handles most calls, but direct access from
    # JS (e.g. Stripe webhooks, background fetches) may still hit this origin.
    # -------------------------------------------------------------------------
    set $cors_origin "";
    if ($http_origin ~* "^https://(centrifungal\.co\.uk|centrifungal\.netlify\.app)$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-TOKEN" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # Handle preflight OPTIONS requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # -------------------------------------------------------------------------
    # Routing
    # -------------------------------------------------------------------------

    # Serve static files directly, fall back to Laravel router
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Health check endpoint (used by Railway)
    location = /api/health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # Deny access to dotfiles (except .well-known for SSL verification)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Cache static assets (CP assets, images uploaded via Statamic)
    location ~* \.(css|js|ico|gif|jpeg|jpg|png|woff2?|svg|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
    }

    # Deny access to SQLite database files
    location ~ \.sqlite {
        deny all;
    }
}

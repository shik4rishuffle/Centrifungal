            type: faq_item
            question: 'How long does a grow log last?'
            answer: 'Most grow logs will produce multiple flushes of mushrooms over 2-4 years depending on the species and how well the log is cared for.'
          -
            type: faq_item
            question: 'Do I need any special equipment?'
            answer: 'No special equipment is needed. A spray bottle for misting and a shaded spot are all you need to get started.'
          -
            type: faq_item
            question: 'How long does shipping take?'
            answer: 'We ship via Royal Mail. Standard delivery is 2-3 working days within the UK.'
          -
            type: faq_item
            question: 'Can I grow mushrooms indoors?'
            answer: 'Yes! Most of our grow logs work well indoors. Just find a cool, shaded spot away from direct sunlight and radiators.'
          -
            type: faq_item
            question: 'What species do you offer?'
            answer: 'We currently offer Shiitake, Oyster, and Lions Mane grow logs. Check our shop for the latest availability.'
          -
            type: faq_item
            question: 'My grow log has not produced any mushrooms yet. What should I do?'
            answer: 'Make sure the log is being kept moist and is in a cool, shaded location. Some logs take a few weeks to start producing. If it has been more than 4 weeks, try soaking the log in cold water overnight to trigger a flush.'

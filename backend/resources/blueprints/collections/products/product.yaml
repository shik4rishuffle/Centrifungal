title: Product
tabs:
  main:
    display: Product
    sections:
      -
        display: 'Product Details'
        fields:
          -
            handle: name
            field:
              type: text
              display: Name
              instructions: 'The product name as it will appear on the website and in orders.'
              validate:
                - required
                - 'max:120'
          -
            handle: description
            field:
              type: bard
              display: Description
              instructions: 'A detailed product description. Keep it clear and helpful for customers.'
              buttons:
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
              allow_source: false
              save_html: false
              sets:
                main:
                  display: 'Content Blocks'
                  sets:
                    text_block:
                      display: 'Text Block'
                      icon: text-formatting-left-align
                      fields:
                        -
                          handle: body
                          field:
                            type: bard
                            display: Body
                            buttons:
                              - bold
                              - italic
                              - unorderedlist
                              - orderedlist
                              - anchor
                            allow_source: false
                            save_html: false
          -
            handle: price
            field:
              type: integer
              display: Price
              instructions: 'Enter price in pence, e.g. 1299 = GBP 12.99'
              validate:
                - required
                - 'min:1'
          -
            handle: category
            field:
              type: select
              display: Category
              instructions: 'Choose the product category. This determines where the product appears on the site.'
              options:
                grow-logs: 'Grow Logs'
                colonised-dowels: 'Colonised Dowels'
                diy-kits: 'DIY Kits'
                tinctures: Tinctures
              validate:
                - required
          -
            handle: in_stock
            field:
              type: toggle
              display: 'In Stock'
              instructions: 'Master stock toggle. If turned off, the product will show as out of stock regardless of variant settings.'
              default: true
          -
            handle: weight_grams
            field:
              type: integer
              display: 'Weight (grams)'
              instructions: 'Product weight in grams. Used to calculate Royal Mail shipping costs.'
              validate:
                - required
                - 'min:1'
      -
        display: 'Sizes & Variants'
        fields:
          -
            handle: sizes_variants
            field:
              type: replicator
              display: 'Sizes & Variants'
              instructions: 'Add size or variant options. Each variant can have its own price, SKU, and stock status.'
              sets:
                variant:
                  display: Variant
                  fields:
                    -
                      handle: variant_name
                      field:
                        type: text
                        display: 'Variant Name'
                        instructions: 'e.g. "Small", "Large", "500ml"'
                        validate:
                          - required
                          - 'max:80'
                    -
                      handle: price_override
                      field:
                        type: integer
                        display: 'Price Override'
                        instructions: 'Leave empty to use the main product price. Enter a value in pence to override.'
                    -
                      handle: sku
                      field:
                        type: text
                        display: SKU
                        instructions: 'Unique stock-keeping unit code for this variant.'
                        validate:
                          - required
                          - 'max:40'
                    -
                      handle: in_stock
                      field:
                        type: toggle
                        display: 'In Stock'
                        instructions: 'Is this variant currently available? The master stock toggle overrides this.'
                        default: true
      -
        display: Images
        fields:
          -
            handle: images
            field:
              type: assets
              display: Images
              instructions: 'Upload product images. The first image will be used as the main product photo. Minimum 1, maximum 8.'
              max_files: 8
              validate:
                - required
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              display: Slug
              instructions: 'The URL-friendly version of the product name.'
              validate:
                - 'max:200'
          -
            handle: stripe_price_id
            field:
              type: hidden
              display: 'Stripe Price ID'
              instructions: 'Managed automatically by the Stripe integration. Do not edit manually.'

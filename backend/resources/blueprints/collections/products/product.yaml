title: Product
tabs:
  main:
    display: 'Basic Info'
    sections:
      -
        display: 'Product Details'
        instructions: 'Core product information that appears on the storefront.'
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: name
            field:
              type: text
              display: Name
              instructions: 'The product name as it will appear on the website and in orders.'
              validate:
                - required
                - 'max:120'
              width: 66
          -
            handle: category
            field:
              type: select
              display: Category
              instructions: 'Choose the product category. This determines where the product appears on the site.'
              options:
                grow-logs: 'Grow Logs'
                colonised-dowels: 'Colonised Dowels'
                diy-kits: 'DIY Kits'
                tinctures: Tinctures
              validate:
                - required
              width: 33
          -
            handle: description
            field:
              type: bard
              display: Description
              instructions: 'A detailed product description. Keep it clear and helpful for customers. You can use bold, italic, links, and lists.'
              buttons:
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
              allow_source: false
              sets:
                main:
                  display: 'Content Blocks'
                  sets:
                    text_block:
                      display: 'Text Block'
                      icon: text-formatting-left-align
                      fields:
                        -
                          handle: body
                          field:
                            type: bard
                            display: Body
                            buttons:
                              - bold
                              - italic
                              - unorderedlist
                              - orderedlist
                              - anchor
                            allow_source: false
                            save_html: false
  pricing:
    display: 'Pricing & Stock'
    sections:
      -
        display: Pricing
        instructions: 'Set the base price and stock status. Prices are in pence (GBP).'
        fields:
          -
            handle: price
            field:
              type: integer
              display: 'Price (pence)'
              instructions: 'Enter price in pence. For example, 1299 = GBP 12.99.'
              validate:
                - required
                - 'min:1'
              width: 33
          -
            handle: weight_grams
            field:
              type: integer
              display: 'Weight (grams)'
              instructions: 'Product weight in grams. Used to calculate Royal Mail shipping costs.'
              validate:
                - required
                - 'min:1'
              width: 33
          -
            handle: in_stock
            field:
              type: toggle
              display: 'In Stock'
              instructions: 'Master stock toggle. If turned off, the product shows as "out of stock" regardless of variant settings.'
              default: true
              width: 33
  variants:
    display: 'Sizes & Variants'
    sections:
      -
        display: 'Sizes & Variants'
        instructions: 'Add size or variant options if this product comes in different sizes or types. Leave empty if there is only one version.'
        fields:
          -
            handle: sizes_variants
            field:
              type: replicator
              display: 'Sizes & Variants'
              instructions: 'Each variant can have its own price, SKU, and stock status. Click "Add Variant" to add one.'
              sets:
                variant:
                  display: Variant
                  fields:
                    -
                      handle: variant_name
                      field:
                        type: text
                        display: 'Variant Name'
                        instructions: 'e.g. "Small", "Large", "500ml"'
                        validate:
                          - required
                          - 'max:80'
                        width: 50
                    -
                      handle: sku
                      field:
                        type: text
                        display: SKU
                        instructions: 'Unique stock-keeping unit code for this variant, e.g. "GL-SHI-SM".'
                        validate:
                          - required
                          - 'max:40'
                        width: 50
                    -
                      handle: price_override
                      field:
                        type: integer
                        display: 'Price Override (pence)'
                        instructions: 'Leave empty to use the main product price. Enter a value in pence to override for this variant.'
                        width: 50
                    -
                      handle: in_stock
                      field:
                        type: toggle
                        display: 'In Stock'
                        instructions: 'Is this variant currently available? The master stock toggle on the Pricing tab overrides this.'
                        default: true
                        width: 50
  images:
    display: Images
    sections:
      -
        display: 'Product Images'
        instructions: 'Upload high-quality product photos. The first image will be the main photo shown on the site.'
        fields:
          -
            handle: images
            field:
              type: assets
              display: Images
              container: images
              instructions: 'Upload product images. The first image is the main product photo. You can drag to reorder. Minimum 1, maximum 8. Accepted formats: JPG, PNG, WebP.'
              max_files: 8
              validate:
                - required
  seo:
    display: SEO
    sections:
      -
        display: 'Search Engine Optimisation'
        instructions: 'These fields help your product appear in Google search results. If left empty, the product name and description will be used.'
        fields:
          -
            handle: meta_title
            field:
              type: text
              display: 'Meta Title'
              instructions: 'Custom page title for search engines. Keep under 60 characters. If empty, the product name is used.'
              validate:
                - 'max:60'
          -
            handle: meta_description
            field:
              type: textarea
              display: 'Meta Description'
              instructions: 'A short summary shown in search results. Keep between 120-160 characters for best results.'
              validate:
                - 'max:160'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate:
                - 'max:200'
              display: Slug
              instructions: 'The URL-friendly version of the product name. Auto-generated from the name.'
          -
            handle: stripe_price_id
            field:
              type: hidden
              display: 'Stripe Price ID'
              instructions: 'Managed automatically by the Stripe integration. Do not edit manually.'
